<html>
	<head>
		{% load static %}
		<script src="{% static "gantt/dhtmlxgantt.js" %}" type="text/javascript"></script>
		<link rel="stylesheet" href="{% static "gantt/dhtmlxgantt.css" %}" />
	</head>
	<body>
		
		<div class="d-flex">
			  <div>

		<button title="{{ _('Download') }}" onclick="return abrir_modal('{{ pdf }}')" type="button" class="btn btn-light"><i class="fa fa-arrow-circle-down" aria-hidden="true"></i></button>
					  </div>
      <a title=" {{ _('Download') }}" href="{{ pdf }}" class="btn btn-light"><i class="fa fa-arrow-circle-down"></i></a>

	  </div>

		<div id="gantt_here" style='width:100%; height:500px;'>
		</div>
		
		<script>
		gantt.config.date_format = "%Y-%m-%d %H:%i";

		gantt.config.order_branch = "marker";
		gantt.config.order_branch_free = true;

		gantt.config.open_tree_initially = true;

		gantt.attachEvent("onLoadEnd", function() {
			gantt.batchUpdate(function() {
				gantt.sort("order", false)
			})
		});

		gantt.attachEvent("onRowDragEnd", function(id, target) {
			//update the order of tasks
			gantt.batchUpdate(function() {
				gantt.eachTask(function(task) {
					task.order = task.$local_index + 1;
					gantt.updateTask(task.id)
				})
			})
		});
		gantt.attachEvent("onBeforeTaskAdd", function(id, task) {
			task.order = task.$local_index + 1;
			return true;
		});

		gantt.init("gantt_here");
		gantt.load("/data/", "json");

		var dp = new gantt.dataProcessor("/data/");
		dp.init(gantt);
		dp.setTransactionMode("REST");

		</script>
	</body>
</html>
